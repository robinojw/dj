name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install go-tui CLI
        run: go install github.com/grindlemire/go-tui/cmd/tui@latest

      - name: Check generated GSX files are up to date
        run: |
          tui generate ./internal/tui/...
          git diff --exit-code -- '*.go' || (echo "Generated GSX files are out of date. Run 'tui generate ./internal/tui/...' and commit." && exit 1)

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -race

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
