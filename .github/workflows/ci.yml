name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install go-tui CLI
        run: go install github.com/grindlemire/go-tui/cmd/tui@latest

      - name: Check generated GSX files are up to date
        run: |
          tui generate ./internal/tui/...
          git diff --exit-code -- '*.go' || (echo "Generated GSX files are out of date. Run 'tui generate ./internal/tui/...' and commit." && exit 1)

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -race

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

      - name: Check file length
        run: |
          violations=""
          for f in $(find . -name '*.go' ! -name '*_test.go' ! -name '*_gsx.go' -not -path './vendor/*'); do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 300 ]; then
              violations="${violations}${f}: ${lines} lines (max 300)\n"
            fi
          done
          if [ -n "$violations" ]; then
            printf "File length violations:\n%b" "$violations"
            exit 1
          fi
