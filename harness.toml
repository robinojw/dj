# DJ - Codex Harness TUI
# Project-level configuration

[model]
default = "gpt-5.1-codex-mini"
reasoning_effort = "medium"
team_threshold = 3            # subtasks before spawning team view

[theme]
name = "tokyonight"           # builtin name OR path to .json file

[mcp.servers]

  [mcp.servers.github]
  type    = "stdio"
  command = "npx @modelcontextprotocol/server-github"
  auto_start = true

  [mcp.servers.filesystem]
  type    = "stdio"
  command = "npx @modelcontextprotocol/server-filesystem"
  auto_start = true

  # [mcp.servers.stripe]
  # type    = "http"
  # url     = "https://mcp.stripe.com"
  # headers = { Authorization = "Bearer ${STRIPE_MCP_KEY}" }
  # auto_start = false

[skills]
paths = [
  "./.codex/skills",
  "~/.config/codex-harness/skills",
]

[execution]
default_mode = "confirm"  # confirm | plan | turbo

[execution.allow]
# Tools always auto-approved (overrides mode restrictions)
tools = [
    "read_file",
    "list_dir",
    "search_code",
    "run_tests",
    "bash(git status*)",
    "bash(git diff*)",
    "bash(go build*)",
]

[execution.deny]
# Blocked in all modes (security floor)
tools = [
    "bash(rm -rf*)",
    "bash(curl*)",
    "read_file(.env*)",
    "write_file(.env*)",
]
